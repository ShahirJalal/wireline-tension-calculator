spring:
  profiles:
    active: dev
  application:
    name: backend

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false

server:
  port: 8081
  servlet:
    context-path: /api

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:secureJwtSecretKeyForOilCalcBackendApplicationMustBeVeryLongAndSecure}
  expiration: 86400000